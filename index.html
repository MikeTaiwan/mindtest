<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        :root {
            --primary: #d4af37; /* 戰術金 */
            --bg: #121212;
            --card-bg: #1e1e1e;
            --text: #e0e0e0;
            --accent: #4caf50;
        }
        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
        }
        #quiz-container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
            max-width: 650px;
            width: 100%;
            text-align: center;
            border: 1px solid #333;
        }
        .progress-bar {
            height: 6px;
            background: #333;
            border-radius: 3px;
            margin-bottom: 25px;
        }
        #progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #8b7322, var(--primary));
            width: 0%;
            transition: width 0.4s ease;
        }
        h1 { font-size: 2.2em; letter-spacing: 2px; margin-bottom: 10px; }
        h2 { color: var(--primary); margin-bottom: 20px; font-weight: 400; }
        .option-btn {
            display: block;
            width: 100%;
            padding: 16px 20px;
            margin: 12px 0;
            background: #252525;
            border: 1px solid #444;
            color: #ccc;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            text-align: left;
            line-height: 1.4;
        }
        .option-btn:hover {
            background: #333;
            border-color: var(--primary);
            color: var(--primary);
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .hidden { display: none !important; }
        #result-page { animation: fadeIn 0.8s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        #result-image { width: 280px; height: auto; margin: 25px 0; filter: drop-shadow(0 0 10px rgba(212,175,55,0.3)); }
        .main-btn {
            background: var(--primary);
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            color: #000;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }
        .main-btn:hover { transform: translateY(-3px); box-shadow: 0 5px 20px rgba(212,175,55,0.5); }
        #result-desc { font-size: 17px; line-height: 1.7; text-align: justify; padding: 0 10px; color: #bbb; }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="start-page">

        <button class="main-btn" onclick="startQuiz()">進入鑑定</button>

    <div id="question-page" class="hidden">

        <h3 id="question-text" style="font-size: 1.4em; margin-bottom: 25px;"></h3>
        <div id="options-container"></div>

        </div>

            { t: "躲在後面完全不敢動。", s: {A:2} },
            { t: "亂衝撞到隊友擋射線。", s: {T:2} },
            { t: "裝備帥但不會開槍。", s: {Heavy:2} },
            { t: "中彈不喊的僵屍。", s: {T:1} }
        ]},
        { q: "擊中敵人的那一瞬間？", a: [
            { t: "下一個是誰？", s: {A:2} },
            { t: "確定他有喊 HIT 避免爭議。", s: {T:2} },
            { t: "我的槍調得真準。", s: {L:2} },
            { t: "戰術執行成功，爽！", s: {T:1} }
        ]},
        { q: "最想磨練的技能？", a: [
            { t: "瞬間出槍的速度與準度。", s: {S:2, A:1} },
            { t: "小組配合與清房動作。", s: {S:1, T:2} },
            { t: "裝備的極限負荷能力。", s: {Heavy:2} },
            { t: "利用死角進行伏擊。", s: {L:1, T:2} }
        ]},
        { q: "生存遊戲最像什麼？", a: [
            { t: "搏擊：純粹體力與反應。", s: {A:1, S:1} },
            { t: "圍棋：每步都在博弈。", s: {T:2, L:1} },
            { t: "模擬：最真實的儀式感。", s: {Heavy:2, T:1} },
            { t: "探險：挑戰自己極限。", s: {L:2} }
        ]},
        { q: "下場前，整理裝備時間？", a: [
            { t: "拿了槍灌瓦斯就走。", s: {A:2, Light:2} },
            { t: "確認彈匣功能與通訊。", s: {T:2} },
            { t: "仔細檢查背心扣具位置。", s: {Heavy:2, T:1} },
            { t: "先拍照，裝備一定要美。", s: {Heavy:2} }
        ]},
        { q: "如何管理體能？", a: [
            { t: "全力以赴，累了就休。", s: {A:2} },
            { t: "維持穩定的推進節奏。", s: {T:2} },
            { t: "以最小位移達成最大壓制。", s: {Heavy:2, L:1} },
            { t: "根據對手強弱分配。", s: {T:1} }
        ]},
        { q: "不確定中彈還是流彈？", a: [
            { t: "直接大喊 HIT 下場。", s: {T:2} },
            { t: "掩護確認後再決定。", s: {A:1} },
            { t: "相信對手，他開火我就下。", s: {L:1} },
            { t: "等裁判判決。", s: {Heavy:1} }
        ]},
        { q: "最後一題，希望封號是？", a: [
            { t: "戰場殺神 (Slayer)。", s: {A:2, S:1} },
            { t: "戰術宗師 (Strategist)。", s: {T:2, S:1} },
            { t: "幻影獵人 (Phantom)。", s: {L:2, T:1} },
            { t: "鋼鐵堡壘 (Fortress)。", s: {Heavy:2, T:1} }
        ]}
    ];

    let currentIdx = 0;
    let scores = { S:0, L:0, A:0, T:0, Light:0, Heavy:0 };

    function startQuiz() {
        document.getElementById('start-page').classList.add('hidden');
        document.getElementById('question-page').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        if (currentIdx >= questions.length) {
            showResult();
            return;
        }
        const q = questions[currentIdx];
        document.getElementById('question-number').innerText = `STEP ${currentIdx + 1} / ${questions.length}`;
        document.getElementById('question-text').innerText = q.q;
        document.getElementById('progress-fill').style.width = `${((currentIdx) / questions.length) * 100}%`;
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';

        // 選項洗牌邏輯
        let shuffledOptions = [...q.a];
        for (let i = shuffledOptions.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffledOptions[i], shuffledOptions[j]] = [shuffledOptions[j], shuffledOptions[i]];
        }

        shuffledOptions.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt.t;
            btn.onclick = () => {
                for (let key in opt.s) { scores[key] += opt.s[key]; }
                currentIdx++;
                showQuestion();
            };
            container.appendChild(btn);
        });
    }

    function showResult() {
        document.getElementById('question-page').classList.add('hidden');
        document.getElementById('result-page').classList.remove('hidden');

        // 智將判定：門檻 60 且需具備觀察力或重裝特質
        if (scores.T >= 60 && (scores.L >= 15 || scores.Heavy >= 15)) {
            renderResult("戰場掠奪者 / 智將", "predator.png", "恭喜！你的戰術思維已達宗師級。對你來說，彈藥、射程都不是限制，你最強大的武器是「敵人的恐懼」。你擅長利用假動作、誘餌（兔子戰術）與心理壓制來控制戰場節奏。實力得到 CS REAL 頭目的認證！");
            return;
        }

        let d = scores.S >= scores.L ? "S" : "L";
        let s = scores.A >= scores.T ? "A" : "T";
        let l = scores.Light >= scores.Heavy ? "L" : "H";
        let resKey = d + s + l;

        const resultsMap = {
            "SAL": ["雷霆尖兵", "sal.png", "你是戰場上的發動機！速度就是一切。你享受前線火拼的快感，是隊友眼中最可靠的箭頭。"],
            "SAH": ["鋼鐵破門手", "sah.png", "你是隊伍中的坦克，暴力破開防線。你不怕痛、不退縮，負責吸收火力讓隊友輸出。"],
            "STL": ["暗影刺客", "stl.png", "你是場上的幽靈。擅長利用死角與潛行，摸到背後給予致命一擊。"],
            "STH": ["戰術執行官", "sth.png", "專業的化身。注重團隊推進與戰術配置，動作標準、切角冷靜。"],
            "LAL": ["荒野游騎兵", "lal.png", "高機動長程獵人。體力極好，在大場地中跑動換位，讓對手永遠摸不透。"],
            "LAH": ["重裝火力手", "lah.png", "移動彈藥庫。用源源不絕的子彈壓制敵方防線，讓他們連頭都不敢露。"],
            "LTL": ["寂靜狙擊手", "ltl.png", "忍耐力的極致。偽裝並融入環境，透過高倍鏡，給予遠處目標一擊必殺。"],
            "LTH": ["戰場防禦大師", "lth.png", "最後一道防線。冷靜的頭腦與精準判斷，只要你在的地方，防線就是穩固的。"]
        };

        const data = resultsMap[resKey] || resultsMap["STH"];
        renderResult(data[0], data[1], data[2]);
    }

    function renderResult(title, img, desc) {
        document.getElementById('result-title').innerText = title;
        document.getElementById('result-image').src = img;
        document.getElementById('result-desc').innerText = desc;
    }
</script>
</body>
</html>
