<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS Real 戰士靈魂鑑定 - 找出你的生存本能</title>
    <style>
        :root {
            --primary: #d4af37; /* 戰術金 */
            --bg: #121212;
            --card-bg: #1e1e1e;
            --text: #e0e0e0;
            --accent: #4caf50;
        }
        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
        }
        #quiz-container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
            max-width: 650px;
            width: 100%;
            text-align: center;
            border: 1px solid #333;
        }
        .progress-bar {
            height: 6px;
            background: #333;
            border-radius: 3px;
            margin-bottom: 25px;
        }
        #progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #8b7322, var(--primary));
            width: 0%;
            transition: width 0.4s ease;
        }
        h1 { font-size: 2.2em; letter-spacing: 2px; margin-bottom: 10px; }
        h2 { color: var(--primary); margin-bottom: 20px; font-weight: 400; }
        .option-btn {
            display: block;
            width: 100%;
            padding: 16px 20px;
            margin: 12px 0;
            background: #252525;
            border: 1px solid #444;
            color: #ccc;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            text-align: left;
            line-height: 1.4;
        }
        .option-btn:hover {
            background: #333;
            border-color: var(--primary);
            color: var(--primary);
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .hidden { display: none !important; }
        #result-page { animation: fadeIn 0.8s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        #result-image { width: 280px; height: auto; margin: 25px 0; filter: drop-shadow(0 0 10px rgba(212,175,55,0.3)); }
        .main-btn {
            background: var(--primary);
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            color: #000;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }
        .main-btn:hover { transform: translateY(-3px); box-shadow: 0 5px 20px rgba(212,175,55,0.5); }
        #result-desc { font-size: 17px; line-height: 1.7; text-align: justify; padding: 0 10px; color: #bbb; }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="start-page">
        <h1 style="color:white">CS <span style="color:var(--primary)">REAL</span></h1>
        <h2>戰士靈魂鑑定</h2>
        <p style="color:#888; margin-bottom: 30px;">40題深度戰術博弈，找出潛藏在體內的戰鬥原型。</p>
        <button class="main-btn" onclick="startQuiz()">進入鑑定</button>
    </div>

    <div id="question-page" class="hidden">
        <div class="progress-bar"><div id="progress-fill"></div></div>
        <div id="question-number" style="color: var(--primary); font-weight: bold; margin-bottom: 10px;"></div>
        <h3 id="question-text" style="font-size: 1.4em; margin-bottom: 25px;"></h3>
        <div id="options-container"></div>
    </div>

    <div id="result-page" class="hidden">
        <h3 style="color:#888; margin:0;">鑑定結果</h3>
        <h1 id="result-title" style="color: var(--primary); margin-top: 10px;"></h1>
        <img id="result-image" src="" alt="戰魂角色">
        <p id="result-desc"></p>
        <button class="main-btn" onclick="location.reload()">重新鑑定</button>
        <div style="margin-top: 30px; font-size: 0.8em; color: #555;">
            <p>截圖結果至 CS REAL 高雄店，領取專屬優惠！</p>
            <p>© 2026 CS REAL Kaohsiung</p>
        </div>
    </div>
</div>
