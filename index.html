<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS Real 戰士靈魂鑑定</title>
    <style>
        :root {
            --primary: #d4af37;
            --bg: #121212;
            --card-bg: #1e1e1e;
            --text: #e0e0e0;
        }
        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
        }
        #quiz-container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
            max-width: 650px;
            width: 100%;
            text-align: center;
            border: 1px solid #333;
        }
        .site-logo {
            display: block;
            width: 300px;
            max-width: 90%;
            height: auto;
            margin: 0 auto 22px auto;
            border-radius: 10px;
        }
        .progress-bar {
            height: 6px;
            background: #333;
            border-radius: 3px;
            margin-bottom: 25px;
        }
        #progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #8b7322, var(--primary));
            width: 0%;
            transition: width 0.4s ease;
        }
        h1 { font-size: 2.2em; letter-spacing: 2px; margin-bottom: 5px; }
        h2 { color: var(--primary); margin-bottom: 20px; font-weight: 400; margin-top: 0; }
        .option-btn {
            display: block;
            width: 100%;
            padding: 16px 20px;
            margin: 12px 0;
            background: #252525;
            border: 1px solid #444;
            color: #ccc;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
            text-align: left;
            line-height: 1.4;
        }
        .option-btn:hover {
            background: #333;
            border-color: var(--primary);
            color: var(--primary);
            transform: scale(1.02);
        }
        .hidden { display: none !important; }
        #result-image { width: 280px; height: auto; margin: 25px 0; filter: drop-shadow(0 0 10px rgba(212,175,55,0.3)); }
        .main-btn {
            background: var(--primary);
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            color: #000;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
        }
        #result-desc { font-size: 16px; line-height: 1.85; text-align: justify; color: #bbb; padding: 0 10px; }
        .result-section {
            margin: 10px 0;
            padding: 12px 16px;
            background: #252525;
            border-left: 3px solid var(--primary);
            border-radius: 6px;
            text-align: left;
        }
        .result-section-title {
            font-size: 13px;
            color: var(--primary);
            font-weight: bold;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="start-page">
        <img src="Logo_banner.png" alt="CS Real 城市戰場" class="site-logo">
        <h1 style="color:white; margin-top: 10px;">CS <span style="color:var(--primary)">REAL</span></h1>
        <h2>戰士靈魂鑑定</h2>
        <p style="color:#888; margin-bottom: 30px;">40題深度戰術博弈，找出潛藏在體內的戰鬥原型。</p>
        <button class="main-btn" onclick="startQuiz()">進入鑑定</button>
    </div>

    <div id="question-page" class="hidden">
        <img src="Logo_banner.png" alt="CS Real" class="site-logo">
        <div class="progress-bar"><div id="progress-fill"></div></div>
        <div id="question-number" style="color: var(--primary); font-weight: bold; margin-bottom: 10px;"></div>
        <h3 id="question-text" style="font-size: 1.4em; margin-bottom: 25px;"></h3>
        <div id="options-container"></div>
    </div>

    <div id="result-page" class="hidden">
        <img src="Logo_banner.png" alt="CS Real" class="site-logo">
        <h3 style="color:#888; margin:0;">鑑定結果</h3>
        <h1 id="result-title" style="color: var(--primary); margin-top: 10px;"></h1>
        <img id="result-image" src="" alt="戰魂角色">
        <div id="result-desc"></div>
        <button class="main-btn" onclick="location.reload()">重新鑑定</button>
        <div style="margin-top: 30px; font-size: 0.8em; color: #444;">
            <p>© 2026 CS REAL Kaohsiung</p>
        </div>
    </div>
</div>

<script>
    const questions = [
        { q: "哨音響起，你如何決定第一步？", a: [

            { t: "依照隊友位置補位，確保戰線無漏洞。", s: {S:1, T:1} },
            { t: "觀察整體動向，尋找能俯瞰全局的制高點。", s: {L:2, T:1} },
            { t: "先不動，透過聲音判斷敵方主攻方向。", s: {L:1, T:2} }
        ]},
        { q: "發現 20 公尺外有敵人掩體露出一半，你會？", a: [

            { t: "靜止不動，等對方探頭確認安全性時再擊發。", s: {S:2, T:1} },
            { t: "利用倍鏡鎖定其邊緣，逼迫對方完全不敢動。", s: {L:2, T:1} },

        { q: "你最不喜歡哪種戰鬥環境？", a: [
            { t: "空曠大平原：沒辦法展現近身壓制力。", s: {S:2} },
            { t: "單向窄巷：沒辦法拉開距離發揮視野優勢。", s: {L:2} },
            { t: "低難度場地：障礙物太少，沒辦法玩心理博弈。", s: {T:2} },
            { t: "復活點太遠：衝鋒斷了節奏很掃興。", s: {A:2} }

        { q: "你的副武器（手槍）對你而言是？", a: [

            { t: "帥是一輩子的事，配色必須完美。", s: {Heavy:1} }

            { t: "找個要道建立防禦點，省下無謂跑動。", s: {L:1, T:1} },
            { t: "不斷換位，確保永遠處於戰場側面。", s: {T:2, S:1} }
        ]},
        { q: "選擇頭部護具時，你的考量？", a: [
            { t: "散熱第一，甚至只帶護目鏡。", s: {Light:2, S:1} },

        { q: "你對『負重』的看法？", a: [

        ]},
        { q: "你的槍枝動力選擇通常基於？", a: [

            { t: "擬真操縱感（如 GBB）。", s: {T:1, S:1} },

    function startQuiz() {
        document.getElementById('start-page').classList.add('hidden');
        document.getElementById('question-page').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        if (currentIdx >= questions.length) {
            showResult();
            return;
        }
        const q = questions[currentIdx];
        document.getElementById('question-number').innerText = `STEP ${currentIdx + 1} / ${questions.length}`;
        document.getElementById('question-text').innerText = q.q;
        document.getElementById('progress-fill').style.width = `${((currentIdx) / questions.length) * 100}%`;

        const container = document.getElementById('options-container');
        container.innerHTML = '';

        let shuffledOptions = [...q.a];
        for (let i = shuffledOptions.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffledOptions[i], shuffledOptions[j]] = [shuffledOptions[j], shuffledOptions[i]];
        }

        shuffledOptions.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt.t;
            btn.onclick = () => {
                for (let key in opt.s) { scores[key] += opt.s[key]; }
                currentIdx++;
                showQuestion();
            };
            container.appendChild(btn);
        });
    }

    function buildResultHTML(sections) {
        return sections.map(sec => `
            <div class="result-section">
                <div class="result-section-title">${sec.title}</div>
                <div>${sec.content}</div>
            </div>

        const data = resultsMap[resKey] || resultsMap["STH"];

    function renderResult(title, img, sections) {
        document.getElementById('result-title').innerText = title;
        document.getElementById('result-image').src = img;

        if (Array.isArray(sections)) {
            descEl.innerHTML = buildResultHTML(sections);
        } else {
            descEl.innerText = sections;
        }
    }
