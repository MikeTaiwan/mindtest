<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS Real 戰士靈魂鑑定</title>
    <style>
        :root {
            --primary: #d4af37; /* 戰術金 */
            --bg: #121212;
            --card-bg: #1e1e1e;
            --text: #e0e0e0;
        }
        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
        }
        #quiz-container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
            max-width: 650px;
            width: 100%;
            text-align: center;
            border: 1px solid #333;
        }
        .progress-bar {
            height: 6px;
            background: #333;
            border-radius: 3px;
            margin-bottom: 25px;
        }
        #progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #8b7322, var(--primary));
            width: 0%;
            transition: width 0.4s ease;
        }
        h1 { font-size: 2.2em; letter-spacing: 2px; margin-bottom: 5px; }
        h2 { color: var(--primary); margin-bottom: 20px; font-weight: 400; margin-top: 0; }
        .option-btn {
            display: block;
            width: 100%;
            padding: 16px 20px;
            margin: 12px 0;
            background: #252525;
            border: 1px solid #444;
            color: #ccc;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
            text-align: left;
        }
        .option-btn:hover {
            background: #333;
            border-color: var(--primary);
            color: var(--primary);
            transform: scale(1.02);
        }
        .hidden { display: none !important; }
        #result-image { width: 280px; height: auto; margin: 25px 0; filter: drop-shadow(0 0 10px rgba(212,175,55,0.3)); }
        .main-btn {
            background: var(--primary);
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            color: #000;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
        }
        #result-desc { font-size: 17px; line-height: 1.7; text-align: justify; color: #bbb; padding: 0 10px; }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="start-page">
        <h1 style="color:white; margin-top: 20px;">CS <span style="color:var(--primary)">REAL</span></h1>
        <h2>戰士靈魂鑑定</h2>
        <p style="color:#888; margin-bottom: 30px;">40題深度戰術博弈，找出潛藏在體內的戰鬥原型。</p>
        <button class="main-btn" onclick="startQuiz()">進入鑑定</button>
    </div>

    <div id="question-page" class="hidden">
        <div class="progress-bar"><div id="progress-fill"></div></div>
        <div id="question-number" style="color: var(--primary); font-weight: bold; margin-bottom: 10px;"></div>
        <h3 id="question-text" style="font-size: 1.4em; margin-bottom: 25px;"></h3>
        <div id="options-container"></div>
    </div>

    <div id="result-page" class="hidden">
        <h3 style="color:#888; margin:0;">鑑定結果</h3>
        <h1 id="result-title" style="color: var(--primary); margin-top: 10px;"></h1>
        <img id="result-image" src="" alt="戰魂角色">
        <p id="result-desc"></p>
        <button class="main-btn" onclick="location.reload()">重新鑑定</button>
        <div style="margin-top: 30px; font-size: 0.8em; color: #444;">
            <p>© 2026 CS REAL Kaohsiung</p>
        </div>
    </div>
</div>

<script>
    // 題庫修正後內容
    const questions = [
        // (省略中間不變的題目...)
        { q: "遇到「僵屍玩家」（不喊HIT），你會？", a: [
            { t: "換個位置補幾槍，打到他痛為止。", s: {A:2} },
            { t: "停止射擊，冷靜回報裁判。", s: {T:2} },
            { t: "連續射擊他外掛的裝備或背心邊緣提醒。", s: {T:1, S:1} },
            { t: "改打他旁邊的隊友。", s: {L:1} }
        ]},
        { q: "面對戰場上實力極強的高手，你會？", a: [
            { t: "拚死擊落他，那才是榮耀。", s: {A:2} },
            { t: "觀察他的走位尋求反制。", s: {T:2, L:1} },
            { t: "跟隨大部隊進行壓制。", s: {Heavy:1} },
            { t: "引誘他進入我方埋伏區。", s: {T:2, S:1} }
        ]},
        // (其餘 38 題請確保使用你原本的完整題庫)
    ];

    let currentIdx = 0;
    let scores = { S:0, L:0, A:0, T:0, Light:0, Heavy:0 };

    function startQuiz() {
        document.getElementById('start-page').classList.add('hidden');
        document.getElementById('question-page').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        if (currentIdx >= questions.length) {
            showResult();
            return;
        }
        const q = questions[currentIdx];
        document.getElementById('question-number').innerText = `STEP ${currentIdx + 1} / ${questions.length}`;
        document.getElementById('question-text').innerText = q.q;
        document.getElementById('progress-fill').style.width = `${((currentIdx) / questions.length) * 100}%`;
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';

        let shuffledOptions = [...q.a];
        for (let i = shuffledOptions.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffledOptions[i], shuffledOptions[j]] = [shuffledOptions[j], shuffledOptions[i]];
        }

        shuffledOptions.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt.t;
            btn.onclick = () => {
                for (let key in opt.s) { scores[key] += opt.s[key]; }
                currentIdx++;
                showQuestion();
            };
            container.appendChild(btn);
        });
    }

    function showResult() {
        document.getElementById('question-page').classList.add('hidden');
        document.getElementById('result-page').classList.remove('hidden');

        if (scores.T >= 60 && (scores.L >= 15 || scores.Heavy >= 15)) {
            renderResult("戰場掠奪者 / 智將", "predator.png", "恭喜！你的戰術思維已達宗師級。對你來說，彈藥、射程都不是限制，你最強大的武器是「敵人的恐懼」。你擅長利用假動作、誘餌與心理壓制來控制戰場節奏。實力得到官方認證！");
            return;
        }

        let d = scores.S >= scores.L ? "S" : "L";
        let s = scores.A >= scores.T ? "A" : "T";
        let l = scores.Light >= scores.Heavy ? "L" : "H";
        let resKey = d + s + l;

        const resultsMap = {
            "SAL": ["雷霆尖兵", "sal.png", "你是戰場上的發動機！速度就是一切。你享受前線火拼的快感，是隊友眼中最可靠的箭頭。"],
            "SAH": ["鋼鐵破門手", "sah.png", "你是隊伍中的坦克，暴力破開防線。你不怕痛、不退縮，負責吸收火力讓隊友輸出。"],
            "STL": ["暗影刺客", "stl.png", "你是場上的幽靈。擅長利用死角與潛行，摸到背後給予致命一擊。"],
            "STH": ["戰術執行官", "sth.png", "專業的化身。注重團隊推進與戰術配置，動作標準、切角冷靜。"],
            "LAL": ["荒野游騎兵", "lal.png", "高機動長程獵人。體力極好，在大場地中跑動換位，讓對手永遠摸不透。"],
            "LAH": ["重裝火力手", "lah.png", "移動彈藥庫。用源源不絕的子彈壓制敵方防線，讓他們連頭都不敢露。"],
            "LTL": ["寂靜狙擊手", "ltl.png", "忍耐力的極致。偽裝並融入環境，透過高倍鏡，給予遠處目標一擊必殺。"],
            "LTH": ["戰場防禦大師", "lth.png", "最後一道防線。冷靜的頭腦與精準判斷，只要你在的地方，防線就是穩固的。"]
        };

        const data = resultsMap[resKey] || resultsMap["STH"];
        renderResult(data[0], data[1], data[2]);
    }

    function renderResult(title, img, desc) {
        document.getElementById('result-title').innerText = title;
        document.getElementById('result-image').src = img;
        document.getElementById('result-desc').innerText = desc;
    }
</script>
</body>
</html>
